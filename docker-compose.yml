services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Акаунт-сервіс ─────────────────────────────────────────────────────────
  # Окремий репо (../account-service, сиблінг-директорія) — повний облік
  # акаунтів: реєстрація, HTTP-сесія, авторизація, socket. Власна БД (тільки
  # accounts + sessions, жодних бізнес-таблиць). Спільний для app і trade-helper.
  # Репо має підпапки service/ (цей образ) і client/ (account-service-client,
  # окремий pip-пакет — сюди не потрібен, збирається лише HTTP-сервіс).
  account-service:
    build:
      context: ../account-service/service
    restart: unless-stopped
    environment:
      ACCOUNT_SERVICE_HOST: "0.0.0.0"
      ACCOUNT_SERVICE_PORT: "8100"
      ACCOUNT_DB_PATH: "/data/accounts.db"
      REDIS_URL: "redis://redis:6379/0"
      SITE_BASE_URL: "https://mangabuff.ru"
      LOG_LEVEL: "INFO"
    volumes:
      - ../account-service/data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      # Відкрито назовні лише для дебагу/адмінських запитів руками.
      # Іншим проєктам (напр. trade-helper) не потрібен цей порт, якщо
      # вони під'єднані як сервіси нижче — резолвлять "account-service"
      # нативно, через спільну docker-мережу цього ж compose-файла.
      - "8100:8100"

  # ── Бізнес-застосунок ─────────────────────────────────────────────────────
  # Scheduler, professions (mining/quiz/daily/reader/...), admin Telegram bot.
  # Жодного HTTP/cookies/socket до сайту напряму — усе через account-service.
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      ACCOUNT_SERVICE_URL: "http://account-service:8100"
      REDIS_URL: "redis://redis:6379/0"
      TZ: "Europe/Kiev"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app.yaml:/app/app.yaml:ro
    depends_on:
      account-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Card-evaluation: оцінка обмінів/цін карт (окремий репо, ../card-evaluation) ──
  # HTTP-мікросервіс над бібліотекою card_evaluation. Репо має підпапки
  # service/ (бібліотека + цей HTTP-шар, зібраний двоступенево — див. його
  # Dockerfile) і client/ (card-evaluation-client, окремий pip-пакет, який
  # використовує trade-helper — сюди для образу не потрібен).
  # Потребує account-service лише опційно (анонімний фолбек без нього).
  card-evaluation:
    build:
      context: ../card-evaluation/service
      dockerfile: service/Dockerfile
      ssh:
        - default
    restart: unless-stopped
    environment:
      DB_PATH: "/data/card_evaluation.db"
      MB_BASE: "https://mangabuff.ru"
      CATALOG_UPDATE_HOURS: "${CE_CATALOG_UPDATE_HOURS:-6}"
      ACCOUNT_SERVICE_URL: "http://account-service:8100"
      MB_ACCOUNT_ID: "${CE_MB_ACCOUNT_ID:-}"
      CARD_EVALUATION_SERVICE_TOKEN: "${CARD_EVALUATION_SERVICE_TOKEN:-}"
    volumes:
      - ../card-evaluation/data:/data
    depends_on:
      account-service:
        condition: service_healthy

volumes:
  redis-data:

