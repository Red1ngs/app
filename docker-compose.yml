services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Акаунт-сервіс ─────────────────────────────────────────────────────────
  # Окремий репо (../account-service, сиблінг-директорія) — повний облік
  # акаунтів: реєстрація, HTTP-сесія, авторизація, socket. Власна БД (тільки
  # accounts + sessions, жодних бізнес-таблиць). Спільний для app і trade-helper.
  # Репо має підпапки service/ (цей образ) і client/ (account-service-client,
  # окремий pip-пакет — сюди не потрібен, збирається лише HTTP-сервіс).
  #
  # УВАГА: /accounts/{id}/request виконує довільний HTTP-запит через живу
  # сесію акаунта — тому ендпоінти (крім /health) захищені спільним
  # Bearer-токеном ACCOUNT_SERVICE_TOKEN (той самий патерн, що й
  # CARD_EVALUATION_SERVICE_TOKEN нижче). Порожній токен = авторизація
  # вимкнена — підходить лише для локальної розробки, ЗАДАЙ токен у .env
  # перед будь-яким запуском на хості з відкритим назовні мережевим доступом.
  account-service:
    build:
      context: ../account-service/service
    restart: unless-stopped
    environment:
      ACCOUNT_SERVICE_HOST: "0.0.0.0"
      ACCOUNT_SERVICE_PORT: "8100"
      ACCOUNT_DB_PATH: "/data/accounts.db"
      REDIS_URL: "redis://redis:6379/0"
      SITE_BASE_URL: "https://mangabuff.ru"
      LOG_LEVEL: "INFO"
      ACCOUNT_SERVICE_TOKEN: "${ACCOUNT_SERVICE_TOKEN:-}"
    volumes:
      - ../account-service/data:/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8100/health').status==200 else 1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    # Порт НЕ прокинутий назовні за замовчуванням — інші сервіси нижче
    # резолвлять "account-service" нативно, через спільну docker-мережу
    # цього ж compose-файла, їм публічний порт не потрібен. Якщо треба
    # подебажити руками з хоста — розкоментуй на час дебагу і обов'язково
    # задай ACCOUNT_SERVICE_TOKEN вище, інакше /accounts/{id}/request
    # дає будь-кому в мережі проксі-доступ до сесій акаунтів.
    # ports:
    #   - "8100:8100"

  # ── Бізнес-застосунок ─────────────────────────────────────────────────────
  # Scheduler, professions (mining/quiz/daily/reader/...), admin Telegram bot.
  # Жодного HTTP/cookies/socket до сайту напряму — усе через account-service.
  app:
    build:
      context: .
    restart: unless-stopped
    environment:
      ACCOUNT_SERVICE_URL: "http://account-service:8100"
      ACCOUNT_SERVICE_TOKEN: "${ACCOUNT_SERVICE_TOKEN:-}"
      REDIS_URL: "redis://redis:6379/0"
      TZ: "Europe/Kiev"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./app.yaml:/app/app.yaml:ro
    depends_on:
      account-service:
        condition: service_healthy
      redis:
        condition: service_healthy

  
volumes:
  redis-data: